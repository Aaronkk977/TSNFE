# ============================================================================
# LLM Prompts for Signal Extraction
# ============================================================================
# These prompts are used for stock signal extraction from video transcripts
# ============================================================================

system_prompt: |
  你是專業的台灣股市分析助手，具備以下能力：
  
  1. **精準理解台灣股市術語**：
     - 買進/加碼 = 看多 (bullish)
     - 賣出/出脫 = 看空 (bearish)
     - 持有/觀望/等待 = 中立 (hold)
     - 回檔整理、加強支撐 = 中立或看多
  
  2. **識別明確的推薦訊號**：
     - 分析師「明確說出」的建議（買或賣）
     - 忽略純粹的「歷史回顧」或「如果...就...」的假設性討論
     - 注意語氣變化（「不建議買進」= 賣出訊號）
  
  3. **推論股票別名**：
     - 「護國神山」、「台積水」 → 2330（台積電）
     - 「發哥」 → 2454（聯發科）
     - 「鴻海」、「阿土伯」 → 2317
     - 「050、台灣五十」 → 0050 ETF
  
  4. **確保資料品質**：
     - 股票代碼必須是台股格式（4位數）
     - 同一股票若多次提及，記錄最後一次的動作
     - 信心度要根據分析師的語氣強度來評估

extraction_prompt: |
  以下是投顧分析師的視頻逐字稿。請提取其中**所有明確的股票買賣訊號**。
  
  ---------- 逐字稿開始 ----------
  {transcript}
  ---------- 逐字稿結束 ----------
  
  ### 提取規則：
  
  1. **只提取明確的建議**：
     - ✓ 「我建議買進 2330」、「台積電可以加碼」
     - ✗ 「2330 歷史上...」、「如果...應該會...」
  
  2. **股票代碼驗證**：
     - 必須是台股 4 位數（0000～9999）
     - 包含上市、上櫃、ETF
     - 代碼和名稱要配對正確
  
  3. **動作分類**：
     - buy：明確建議買進、加碼、布局、佈局、累積
     - sell：明確建議賣出、出脫、獲利了結、減碼
     - hold：建議持有、觀望、等待、不動
  
  4. **信心度評估** (0.0 ~ 1.0)：
     - 1.0：非常肯定、強烈推薦、明確說出買/賣
     - 0.7：較為肯定、有把握、建議性較強
     - 0.5：不確定、可能、或許、參考
     - 0.3：弱訊號、閒聊、題外話
     - < 0.3：先忽略此訊號
  
  5. **輸出格式**（JSON）：
     必須包含以下欄位：
     - stock_code: "2330" (台股代碼)
     - stock_name: "台積電"
     - action: "buy" | "sell" | "hold"
     - confidence: 0.7 (0~1 評分)
     - reasoning: "分析師原文引述，保持原意" (1-2 句)
     - mentioned_price: 1500.0 (如果有提及目標價，否則 null)
  
  ### 常見誤區（要迴避）：
  - ❌ 「上次買進的人...」→ 不是現在的建議
  - ❌ 「如果突破 X 價格就會...」→ 假設情境，不是確定訊號
  - ❌ 「我個人持有 2330」→ 個人部位，可能有利益衝突
  - ❌ 「技術面看起來...」→ 除非明說買賣，否則不算訊號
  
  ### 實例：
  
  分析師說：「台積電最近表現不錯，我認為可以加碼，目標價 1500。」
  
  ✓ 正確提取：
  {
    "stock_code": "2330",
    "stock_name": "台積電",
    "action": "buy",
    "confidence": 0.8,
    "reasoning": "分析師認為可以加碼台積電，目標價 1500",
    "mentioned_price": 1500.0
  }
  
  ---
  
  請仔細分析逐字稿，返回符合上述要求的 JSON 陣列。

fallback_prompt: |
  無法完整提取訊號，請至少回傳以下信息：
  - 逐字稿中提到哪些股票？
  - 對每支股票是什麼態度（買/賣/中立）？
  - 有無具體目標價或時間框架？
  
  即使格式不完美，也請盡量回傳有效訊號。

validation_prompt: |
  檢查以下股票訊號是否合理。股票代碼必須是台股 4 位數格式，動作必須是 buy/sell/hold。
  
  訊號：{signal}
  
  是否有效？詳述任何問題。

summary_prompt: |
  總結以下投顧分析師視頻逐字稿的主要觀點：
  1. 對大盤的看法
  2. 推薦最多的股票及理由
  3. 最具爭議的觀點
  
  逐字稿：{transcript}

multi_language_prompt: |
  You are a professional Taiwan stock market analyst assistant. Extract stock buy/sell signals from the transcript below.
  
  Transcript:
  {transcript}
  
  Return signals in the following JSON format:
  [
    {{
      "stock_code": "2330",
      "stock_name": "TSMC",
      "action": "buy",
      "confidence": 0.8,
      "reasoning": "Expert recommendation with strong conviction"
    }}
  ]
