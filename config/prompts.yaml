# ============================================================================
# LLM Prompts for Signal Extraction
# ============================================================================
# These prompts are used for stock signal extraction from video transcripts
# ============================================================================

system_prompt: |
  你是專業的台灣股市分析助手，具備以下能力：
  
  1. **精準理解台灣股市術語**：
     - 買進/加碼 = 看多 (bullish)
     - 賣出/出脫 = 看空 (bearish)
     - 持有/觀望/等待 = 中立 (hold)
  
  2. **識別明確的推薦訊號**：
     - 分析師「明確說出」的建議（買或賣）
     - 忽略純粹的「歷史回顧」或「如果...就...」的假設性討論
     - 注意語氣變化（「不建議買進」= 中立訊號）
  
  3. **推論股票別名**：
     - 「護國神山」 → 2330（台積電）
     - 「發哥」 → 2454（聯發科）
     - 「鴻海」、「阿土伯」 → 2317
     - 「050、台灣50」 → 0050 ETF
  
  4. **確保資料品質**：
     - 股票代碼必須是台股格式（大多4位數字）
     - 同一股票若多次提及，記錄最後一次的操作建議
     - 信心度要根據分析師的語氣強度來評估

  5. **根據前後文推敲標的**：
     - 分析師提到的標的名稱可能模糊，或有多種可能，須根據前後文的產業內容、行情說明推敲
     - 若只提產業沒提到股票名稱，如記憶體、玻纖布，請不要自行腦補

extraction_prompt: |
  以下是投顧分析師的視頻逐字稿。請提取其中**所有明確的股票買賣訊號**。
  
  ---------- 逐字稿開始 ----------
  {transcript}
  ---------- 逐字稿結束 ----------
  
  ### 提取規則：
  
  1. **只提取明確的建議**：
     - ✓ 「我建議買進 2330」、「台積電可以加碼」
     - ✗ 「2330 歷史上...」、「如果...應該會...」
  
  2. **股票代碼驗證**：
     - 一般上市櫃股票：通常為 4 位數字（例如：2330, 2605, 3037）。
     - ETF 與 ETN：通常為 4 到 6 位數的英數字組合，結尾常帶有英文字母表示屬性（例如：0050, 00632R, 00642U, 00679B）。
     - 代碼和名稱要配對正確
  
  3. **動作分類**：
     - buy：明確建議買進、加碼、布局、佈局、累積
     - sell：明確建議賣出、出脫、獲利了結、減碼
     - hold：建議持有、觀望、等待、不動
  
  4. **輸出格式**（JSON）：
     請嚴格「只」輸出 JSON 格式的陣列（Array），嚴禁輸出帶有 Markdown 標記 (如 ```json) 或格式損壞的字串，且必須包含以下欄位：
     - stock_code: "2330" (台股代碼)
     - stock_name: "台積電"
     - action: "buy" | "sell" | "hold"
     - reasoning: "分析師原文引述，保持原意" (1-2 句)
  
  ### 常見誤區（要迴避）：
  - ❌ 「上次買進的人...」→ 不是現在的建議
  - ❌ 「如果突破 X 價格就會...」→ 假設情境，不是確定訊號
  - ❌ 「技術面看起來...」→ 除非明說買賣，否則不算訊號
  
   ### 實例：
  
  分析師說：「台積電最近表現不錯，我認為可以加碼，目標價 1500。」
  
   ✓ 正確提取（必須返回陣列）：
   [
      {
         "stock_code": "2330",
         "stock_name": "台積電",
         "action": "buy",
         "reasoning": "分析師認為可以加碼台積電，目標價 1500"
      },
      {
         "stock_code": "2454",
         "stock_name": "聯發科",
         "action": "hold",
         "reasoning": "分析師建議短線觀望，等待突破後再加碼"
      }
   ]

   ### 全量要求：
   - 若逐字稿明確提及多檔標的，必須全部列出，不可只回傳單一標的。
  
  ---
  
  請仔細分析逐字稿，返回符合上述要求的 JSON 陣列。

fallback_prompt: |
  無法完整提取訊號，請至少回傳以下信息：
  - 逐字稿中提到哪些股票？
  - 對每支股票是什麼態度（買/賣/中立）？
  - 有無具體目標價或時間框架？
  
  即使格式不完美，也請盡量回傳有效訊號。

validation_prompt: |
  檢查以下股票訊號是否合理。股票代碼必須是台股 4 位數格式，動作必須是 buy/sell/hold。
  
  訊號：{signal}
  
  是否有效？詳述任何問題。

summary_prompt: |
  總結以下投顧分析師視頻逐字稿的主要觀點：
  1. 對大盤的看法
  2. 推薦最多的股票及理由
  3. 最具爭議的觀點
  
  逐字稿：{transcript}

multi_language_prompt: |
  You are a professional Taiwan stock market analyst assistant. Extract stock buy/sell signals from the transcript below.
  
  Transcript:
  {transcript}
  
  Return signals in the following JSON format:
  [
    {{
      "stock_code": "2330",
      "stock_name": "TSMC",
      "action": "buy",
      "reasoning": "Expert recommendation with strong conviction"
    }}
  ]

multimodal_prompt: |
  你將直接觀看/聆聽上傳的影片或音訊，請一次性完成台股標的結構化評分。

  請輸出 JSON 陣列，每筆格式：
  {
      "ticker": "股票代號(4~5碼，可含尾碼字母)",
      "stock_name": "標的名稱",
      "reasoning": "簡短依據（<=40字）",
      "label": "買進|賣出|中立（持有）|模糊",
      "label_reason": "標籤理由（20~40字）"
  }

  規則：
  - 全量提取所有被提及可交易標的（股票/ETF/槓反ETF）。
  - 若態度不明，label 必須為「模糊」，不能省略。
  - 嚴格排除「年份/年代/價格/數量」等數字（例如 1987、1970、1000）作為 ticker。
  - 若 stock_name 與 ticker 對不上（例如 2002 卻填威剛），該筆不得輸出。
  - 僅輸出 JSON，不要其他文字。

youtube_url_multimodal_prompt: |
  請直接觀看/理解以下 YouTube 影片網址內容，並完成台股標的結構化評分：
  {youtube_url}

  請輸出 JSON 陣列，每筆格式：
  {{
      "ticker": "股票代號(4~5碼，可含尾碼字母)",
      "stock_name": "標的名稱",
      "reasoning": "簡短依據（<=40字）",
      "label": "買進|賣出|中立（持有）|模糊",
      "label_reason": "標籤理由（20~40字）"
  }}

  規則：
  - 不可新增清單外 ticker。
  - 若資訊不足，label 請填模糊。
  - 只輸出 JSON。
