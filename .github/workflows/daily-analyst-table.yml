name: Daily Analyst Stock Table

on:
  schedule:
    - cron: '0 0 * * 1-5'
  workflow_dispatch:

jobs:
  build-table:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Prepare yt-dlp cookies
        env:
          YT_COOKIES_TXT: ${{ secrets.YT_COOKIES_TXT }}
        run: |
          if [ -z "$YT_COOKIES_TXT" ]; then
            echo "Missing required secret: YT_COOKIES_TXT"
            exit 1
          fi
          mkdir -p local
          printf '%s' "$YT_COOKIES_TXT" > local/cookies.txt
          python scripts/clean_yt_cookies.py --input local/cookies.txt --output local/cookies.txt
          chmod 600 local/cookies.txt

      - name: Run daily analyst table
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          # FUGLE_API_KEY: ${{ secrets.FUGLE_API_KEY }}
          YT_COOKIES_FILE: local/cookies.txt
          LLM_PROVIDER: gemini
          LLM_MODEL: gemini-2.5-pro
          TRANSCRIPTION_PROVIDER: gemini
          GEMINI_TRANSCRIPTION_MODEL: gemini-2.5-flash
        run: |
          python scripts/daily_analyst_table.py --mode text --text-source auto --days-back 2 --max-videos 1

      - name: Upload reports artifact
        uses: actions/upload-artifact@v4
        with:
          name: analyst-stock-table
          path: |
            data/reports/analyst_stock_matrix.md
            data/reports/analyst_stock_matrix.csv
            data/reports/daily_run_summary.json
